Postprocessing:
  default_plot_config:
    cms_text: "Open Data"
    image_type: ".png"
    
  default_style_set:
    styles:
      - pattern:
          sample_type: Data
        style:
          plottype: errorbar
          color: black
          marker: 'o'
      - pattern:
          dataset_name: '*SMHiggsToZZTo4L*'
        style:
          plottype: step
          color: cms-red
          linewidth: 2
      - pattern:
          name: '*'
        style:
          plottype: fill

  processors:
    - name: ModelPlot
      inputs:
        - "*/*/*/HiggsMass"
        - "*/*/*/Z1Mass"
        - "*/*/*/Z2Mass"
      structure:
        group: {"era.name": "*", "name": "*"}
        subgroups:
          background:
            select: {dataset_name: "opendata_ZZTo*"}
            transforms:
              - name: SumHistograms
                sum_match_pattern: {pipeline: "*"}
                new_meta_fields: {title: "ZZ->4L (MC)"}
          signal:
            select: {dataset_name: "*SMHiggsToZZTo4L*"}
            transforms:
              - name: SumHistograms
                sum_match_pattern: {pipeline: "*"}
          data:
            select: {dataset_name: "*Double*"}
            transforms:
              - name: SumHistograms
                sum_match_pattern: {pipeline: "*"}
                new_meta_fields: {title: "Data"}
        transforms:
          - name: SelectAxesValues
            select_axes_values:
              variation: [central]
      output_name: "{prefix}/ratio_{era.name}_{name}.png"
