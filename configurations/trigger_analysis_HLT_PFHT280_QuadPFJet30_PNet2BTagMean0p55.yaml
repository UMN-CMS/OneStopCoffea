analyzer:
  default_run_builder:
    strategy_name: NoSystematics

  supercool_first_pipeline:   
      
    - module_name: JetFilter # Make a column of the good jets/event
      input_col: Jet
      output_col: GoodJet

    - module_name: NObjFilter #Spec that I want at least 4 
      selection_name: 'FourPlusGoodJets'
      input_col: GoodJet
      min_count: 4      

    - module_name: SimpleCategory
      input_col: "HLT.PFHT280_QuadPFJet30_PNet2BTagMean0p55"
      cat_name: PassHT
      bins: 2
      start: 0
      stop: 2

    - module_name: HT                    # Make HT values available
      input_col: GoodJet
      output_col: ht

    - module_name: SimpleHistogram
      hist_name: HT_before_selection
      input_cols: [ht]
      axes:
        - name: HT
          start: 0
          stop: 2000
          bins: 60
          unit: GeV

    - module_name: SelectOnColumns
      sel_name: 'Selection'

    - module_name: SimpleHistogram
      hist_name: HTGood
      input_cols: [ht]
      axes:
        - name: HT
          start: 0
          stop: 2000
          bins: 60
          unit: GeV

    - module_name: ScalarSelection
      selection_name: 'HTGreaterHTFlat'
      input_col: ht
      cut_val: 400
      above: True

    - module_name: SelectOnColumns
      sel_name: 'Selection2'

    - module_name: SimpleHistogram
      hist_name: HT_aftercutHTFlat
      input_cols: [ht]
      axes:
        - name: HT
          start: 0
          stop: 2000
          bins: 60
          unit: GeV

    - module_name: PromoteIndex 
      input_col: GoodJet
      output_col: FourthGoodJet
      index: 3

        #    - module_name: SimpleHistogram
        #hist_name: PTFourth
        #input_cols: [FourthGoodJet]
        #axes:
        #- name: PT4
        #  start: 0
        #  stop: 350
        #  bins: 50
        #  unit: GeV

    - module_name: BQuarkMaker
      input_col: GoodJet
      output_col: BGoodJet
      working_point: 'T'

event_collections:
  - dataset: '*run3hlt*'
    pipelines: [supercool_first_pipeline]
location_priorities: [".*(T0|T1|T2).*","eos"]

Postprocessing: 
  processors:
   - name: RatioPlot
     inputs:
       - "*/*/*/HT"
     structure:
       group: {pipeline: "*", dataset_name: "*"}
       subgroups:
         denominator:
           transforms:
             - name: SelectAxesValues
               select_axes_values: {"variation":"central"}
             - name: MergeAxes
               merge_axis_names: ["PassHT"]
         numerator:
           transforms:
             - name: SelectAxesValues
               select_axes_values: {"variation":"central","PassHT":[1]}
     output_name: "{prefix}/{pipeline}/{dataset_name}/{name}.png"

   - name: Efficiency2D
     inputs: 
       - "*/*/*/HT"
     group_xy_patterns: ["other_data":"stop_mass", "other_data" : "chargino_mass"]
     xyz_labels: ["ms", "mx", "efficiencies"] 
     structure: 
       group: {pipeline: "*", dataset_name: "*"}
       subgroups:
         passing_events:
           transforms: 
             - name: SelectAxesValues
               select_axes_values: {"variation":"central"}
             - name: MergeAxes
               merge_axis_names: ["PassHT"]
         all_events:
           transforms:
             - name: SelectAxesValues
               select_axes_values: {"variation":"central"}
     output_name: "{prefix}/{pipeline}/{dataset_name}/{name}.png"
