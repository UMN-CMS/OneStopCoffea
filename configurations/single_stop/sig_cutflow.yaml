{% import 'singlestop_base.yaml' as base %}
{% import 'postprocessors/visualize_variations.yaml' as post %}
{% import 'postprocessors/simple_1d.yaml' as post1d %}

analyzer:
  default_run_builder:
    # strategy_name: CompleteSysts
    # strategy_name: LimitSysts
    # systs:
    #   or_exprs:
    #     - "bjetshapesf*disabled"
    #     - "trigger*"
    # strategy_name: SignalOnlySysts
    strategy_name: NoSystematics

  Signal312:
    - module_name: SimpleHLT
      triggers: [HT,AK8SingleJetPtNoTrim, AK8SingleJetPt]
      should_run:
        sample_type: Data
    {{ base.event_level_cleanup() | indent(4) }}
    - module_name: SelectOnColumns
      sel_name: pre_selection
    {{ base.jec_jer_corrections() | indent(4) }}
    {{ base.singlestop_objects() | indent(4) }}
    {{ base.weights() | indent(4) }}
    - module_name: TriggerBNNCorrection
      base_path: postprocessing/newtriggereffs/
      correction_pattern: "{era}.json.gz"
    - module_name: NObjFilter
      input_col: MedB
      selection_name: 2bjet
      min_count: 2
    - module_name: NObjFilter
      input_col: TightB
      selection_name: 1tightbjet
      min_count: 1
    - module_name: VecDRSelection
      input_col: MedB
      selection_name: b_dr
      min_dr: 1.0
    {{ base.singlestop_common_selection() | indent(4) }}
    - module_name: SelectOnColumns
      sel_name: selection

  Signal313:
    - module_name: SimpleHLT
      triggers: [HT,AK8SingleJetPtNoTrim, AK8SingleJetPt]
      should_run:
        sample_type: Data
    {{ base.event_level_cleanup() | indent(4) }}
    - module_name: SelectOnColumns
      sel_name: pre_selection
    {{ base.jec_jer_corrections() | indent(4) }}
    {{ base.singlestop_objects() | indent(4) }}
    {{ base.weights() | indent(4) }}
    - module_name: TriggerBNNCorrection
      base_path: postprocessing/newtriggereffs/
      correction_pattern: "{era}.json.gz"
    - module_name: NObjFilter
      input_col: TightB
      selection_name: 3tightbjet
      min_count: 3
    - module_name: VecDRSelection
      input_col: MedB
      selection_name: b_dr
      min_dr: 1.0
    {{ base.singlestop_common_selection() | indent(4) }}
    - module_name: SelectOnColumns
      sel_name: selection

location_priorities: [".*FNAL.*", ".*US.*", ".*(DE|IT|CH|FR).*", ".*(T0|T1|T2).*","eos"]

event_collections:
  # DO NOT UNCOMMENT!!!!!!!
  # - dataset: 'data_JetHT_*'
  #   pipelines: [Signal312, Signal313]

  # Data samples
  - dataset: 'signal_2018_312_900_400_official'
    pipelines: [Signal312]
  - dataset: 'signal_2018_312_1000_900_official'
    pipelines: [Signal312]
  - dataset: 'signal_2018_312_1500_600_official'
    pipelines: [Signal312]
  - dataset: 'signal_2018_312_1700_1600_official'
    pipelines: [Signal312]
  - dataset: 'signal_2018_312_2000_600_official'
    pipelines: [Signal312]
  - dataset: 'signal_2018_312_2000_1400_official'
    pipelines: [Signal312]

  - dataset: 'signal_2018_313_900_400_official'
    pipelines: [Signal313]
  - dataset: 'signal_2018_313_1000_900_official'
    pipelines: [Signal313]
  - dataset: 'signal_2018_313_1500_600_official'
    pipelines: [Signal313]
  - dataset: 'signal_2018_313_1700_1600_official'
    pipelines: [Signal313]
  - dataset: 'signal_2018_313_2000_600_official'
    pipelines: [Signal313]
  - dataset: 'signal_2018_313_2000_1400_official'
    pipelines: [Signal313]
  
  
extra_executors:
  test:
    executor_name: ImmediateExecutor
    chunk_size: 10000

  test2:
    executor_name: LocalDaskExecutor
    chunk_size: 100000
    min_workers: 1
    max_workers: 3
    reduction_factor: 2
  
  testcondor:
    executor_name: LPCCondorDask
    container: /cvmfs/unpacked.cern.ch/registry.hub.docker.com/coffeateam/coffea-dask-almalinux9:2025.10.2-py3.12
    venv_path: .venv
    chunk_size: 80000
    min_workers: 40
    max_workers: 200
    worker_memory: 4GB
    reduction_factor: 5


Postprocessing:
  processors:
    - name: CutflowTable
      inputs:
        - "*/*/*/selection"
      key: "{other_data.stop_mass}_{other_data.chargino_mass}"
      structure:
        group: {era.name: "*", pipeline: "*"}
      output_name: "{prefix}/{era.name}_{pipeline}.csv"
    - name: CutflowTable
      inputs:
        - "*/*/*/selection"
      key: "{dataset_title}"
      highlight_rows: [[4,"LightCoral"]]
      format: latex
      standalone: true
      structure:
        group: {era.name: "*", pipeline: "*"}
      output_name: "{prefix}/{era.name}_{pipeline}.tex"


  default_plot_config:
    cms_text: "Preliminary"
    image_type: ".png"
    cms_text_color: Black
    legend_num_cols: 1

