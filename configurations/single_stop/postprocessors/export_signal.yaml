processors:
  - name: Dump
    inputs:
      # - "*/*/*/comp_mChi" 
      # - "*/*/*/comp_mStop" 
      # - "*/*/*/uncomp_mStop" 
      # - "*/*/*/uncomp_mChi" 
      - "*/*/*/uncomp_mStop_vs_mChiRatio" 
      - "*/*/*/comp_mStop_vs_mChiRatio" 
      - "*/*/*/verycomp_mStop_vs_mChiRatio" 
      - "*/*/*/complete_uncomp_mStop_vs_mChiRatio" 
      - "*/*/*/complete_comp_mStop_vs_mChiRatio" 
    structure:
      group: {dataset_name: "*", era.name: "*", pipeline: "*"}
      transforms: 
        - name: NormalizeSystematicByProjection
          normalize_within: ["HT_Cat"]
          pre_sf_name: "bjetshapesf-variation_disabled"
          variation_axis: "variation"
          should_run:
            dataset_name: "signal*"
        - name: MergeAxes
          merge_axis_names: ["HT_Cat"]
          should_run:
            sample_type: "MC"
    output_name: "{prefix}/{era.name}/{pipeline}/{dataset_name}/{name}.pklz4"
