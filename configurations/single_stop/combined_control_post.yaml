post_common_mc_transforms: &post_common_mc_transforms
  - name: NormalizeSystematicByProjection
    normalize_within: ["HT_Cat"]
    pre_sf_name: "bjetshapesf-variation_disabled"
    post_sf_name: "central"
    variation_axis: "variation"
  - name: SelectAxesValues
    select_axes_values: {"variation": "central"}
  - name: MergeAxes
    merge_axis_names: ["HT_Cat"]

Postprocessing:
  processors:
    - name: HistogramPulls2D
      inputs: 
        - "*/*/*/comp_mStop_vs_mChiRatio"
        - "*/*/*/uncomp_mStop_vs_mChiRatio"
      normalize: True 
      scale: linear
      structure:
        select: {dataset_name: "*"}
        group: {pipeline: "ControlEmulation"}
        subgroups:
          hist1:
            select: {dataset_name: "data*2016_post*"}
            transforms:
              - name: SelectAxesValues
                select_axes_values: {"variation": "central"}
            title: minus 
          hist2:
            select: {dataset_name: "data*2018*"}
            transforms:
              - name: SelectAxesValues
                select_axes_values: {"variation": "central"}
            title: plus 
      output_name: "{prefix}/{pipeline}/{name}_data_2018_2016_post_pulls.pdf"
      plot_configuration:
        cms_text: "Preliminary"
        image_type: ".pdf"
        cms_text_color: 'black'
        legend_num_cols: 1
