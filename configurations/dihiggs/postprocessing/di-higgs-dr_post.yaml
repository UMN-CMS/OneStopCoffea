Postprocessing:
  processors:
    - name: DRPlotWithLine
      inputs:
        - "*/*/*/*"
      show_info: True
      vline: 0.4
      vline_label: 'AK4 R'
      structure:
        select: {name: "min_dr_GenPart"}
        group: {era.name: "*", pipeline: "*", name: "*"}
        transforms:
          - name: SplitAxes
            split_axis_names: ["variation"]
      output_name: "plots_DR/{era.name}/{pipeline}/min_dr_GenPart.png"
    
    - name: DRPlotWithLine
      inputs:
        - "*/*/*/*"
      show_info: True
      vline: 0.4
      vline_label: 'AK4 R'
      structure:
        select: {name: "min_dr_gen_hww"}
        group: {era.name: "*", pipeline: "*", name: "*"}
        transforms:
          - name: SplitAxes
            split_axis_names: ["variation"]
      output_name: "plots_DR/{era.name}/{pipeline}/min_dr_gen_hww.png"
    
    - name: DRPlotWithLine
      inputs:
        - "*/*/*/*"
      show_info: True
      vline: 0.8
      vline_label: 'AK8 R'
      structure:
        select: {name: "max_dr_4q"}
        group: {era.name: "*", pipeline: "*", name: "*"}
        transforms:
          - name: SplitAxes
            split_axis_names: ["variation"]
      output_name: "plots_DR/{era.name}/{pipeline}/max_dr_4q.png"

    - name: DRPlotWithLine
      inputs:
        - "*/*/*/*"
      show_info: True
      vline: 0.8
      vline_label: 'AK8 R'
      structure:
        select: {name: "max_dr_3q"}
        group: {era.name: "*", pipeline: "*", name: "*"}
        transforms:
          - name: SplitAxes
            split_axis_names: ["variation"]
      output_name: "plots_DR/{era.name}/{pipeline}/max_dr_3q.png"

  default_plot_config:
    cms_text: "Preliminary"
    image_type: ".png"
    cms_text_color: Black
    legend_num_cols: 1
