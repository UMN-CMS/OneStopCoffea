Postprocessing:
  processors:
    - name: Histogram1D
      inputs:
        - "*/*/*/*"
      scale: linear
      normalize: True
      show_info: True
      structure:
        select: {name: "!selection"}
        group: {name: "*"}
        subgroups:
          unstacked:
            - select: {pipeline: "NoSelection", era.name: "2024"}
              transforms:
                - name: FormatTitle
                  title_format: "2024"
            - select: {pipeline: "NoSelection_2023", era.name: "2023_preBPix"}
              transforms:
                - name: FormatTitle
                  title_format: "2023 preBPix"
            - select: {pipeline: "NoSelection_run2_2018", era.name: "2018"}
              transforms:
                - name: FormatTitle
                  title_format: "2018"
          stacked: []
        transforms:
          - name: SplitAxes
            split_axis_names: {"variation": "central"}
      output_name: "plots_LINEAR/overlay/{name}"

  default_plot_config:
    cms_text: "Preliminary"
    image_type: ".png"
    cms_text_color: Black
    legend_num_cols: 1
