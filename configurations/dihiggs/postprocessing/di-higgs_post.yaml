Postprocessing:
  processors:
    - name: Histogram1D
      inputs:
        - "*/*/*/*"
      scale: linear
      normalize: False
      show_info: True
      structure:
        select: {dataset_name: "*", name: "!selection"}
        group: {pipeline: "*", era.name: "*", name: "*"}
        transforms:
          - name: SplitAxes
            split_axis_names: {"variation": "central"}
      output_name: "plots_LINEAR1/{era.name}/{pipeline}/{name}"

    - name: RatioPlot
      inputs:
        - "*/*/*/*"
      ratio_type: "efficiency"
      show_den_unc: False
      scale: linear
      structure:
        select: {dataset_name: "ggHH2b2V6q*", name: "!selection"}
        group: {era.name: "*", name: "*"}
        subgroups:
          denominator:
            select: {pipeline: NoSelection}
            transforms:
              - name: FormatTitle
                title_format: "{pipeline}"
          numerator:
            select: {pipeline: withHLT_NoSelection}
            transforms:
              - name: FormatTitle
                title_format: "{pipeline}"
        transforms:
          - name: SelectAxesValues
            select_axes_values: {"variation": "central"}
          - name: SliceAxes
            slices: {0: [0,1200]}
      output_name: "plots_LINEAR1/{era.name}/trigger_eff_{name}.png"

  default_plot_config:
    cms_text: "Preliminary"
    image_type: ".png"
    cms_text_color: Black
    legend_num_cols: 1
