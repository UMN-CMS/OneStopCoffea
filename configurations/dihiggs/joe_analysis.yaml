{% import 'core.yaml' as core %}

common_histograms: &common_histograms
  - module_name: TopVecHistograms
    prefix: "Jet"
    input_col: goodJet
    max_idx: 6

  - module_name: FourVecHistograms
    input_col: goodJet
    hist_name: Jet
    mass_axis:
      name: "Jet $m$"
      start: 0
      stop: 500
      bins: 50

  - module_name: SimpleHistogram
    hist_name: JetHT
    input_cols: [HT]
    axes:
      - name: HT
        start: 0
        stop: 3000
        bins: 60
        unit: GeV
    
  - module_name: SimpleHistogram
    hist_name: JetN
    input_cols: [NJet]
    axes:
      - name: "$N_{jets}$"
        start: -0.5
        stop: 13.5
        bins: 14

  - module_name: SimpleHistogram
    hist_name: JetQvG
    input_cols: [goodJet.btagUParTAK4QvG]
    axes:
      - name: "Jet PNetQvG Score"
        start: 0
        stop: 1
        bins: 20

  - module_name: SimpleHistogram
    hist_name: Jetbtag
    input_cols: [goodJet.btagUParTAK4B]
    axes:
      - name: "Jet UParTB Score"
        start: 0
        stop: 1
        bins: 20

  - module_name: FourVecHistograms
    input_col: MedB
    hist_name: MedB

  - module_name: SimpleHistogram
    hist_name: MedBN
    input_cols: [NMedB]
    axes:
      - name: "$N_{b}$"
        start: -0.5
        stop: 13.5
        bins: 14

  - module_name: JetComboHistograms
    input_col: MedB
    prefix: "b_dijet"
    jet_combos:
      - [0,1]
    mass_axis:
      name: "b_dijet"
      start: 0
      stop: 500
      bins: 50

  - module_name: FourVecHistograms
    input_col: nontop2b
    hist_name: nontop2b

  - module_name: JetComboHistograms
    input_col: nontop2b
    prefix: "nontop2b"
    jet_combos:
      - [0,1,2,3]
    mass_axis:
      name: "nontop2b"
      start: 0
      stop: 500
      bins: 50

  - module_name: FourVecHistograms
    input_col: Jet
    hist_name: AK4Jet
    mass_axis:
      name: "AK4Jet"
      start: 0
      stop: 500
      bins: 50
      unit: "GeV"

  - module_name: SimpleHistogram
    hist_name: AK4NJet
    input_cols: [NAK4Jet]
    axes: 
      - name: "$N_{AK4Jets}$"
        start: -0.5
        stop: 13.5
        bins: 14

  - module_name: SimpleHistogram
    hist_name: AK4JetQvG
    input_cols: [Jet.btagPNetQvG]
    axes:
      - name: "AK4Jet PNetQvG Score"
        start: 0
        stop: 1
        bins: 20

  - module_name: SimpleHistogram
    hist_name: AK4Jetbtag
    input_cols: [Jet.btagUParTAK4B]
    axes:
      - name: "AK4Jet UParTB Score"
        start: 0
        stop: 1
        bins: 20  

  - module_name: SimpleHistogram
    hist_name: AK4JetID
    input_cols: [Jet.jetId]
    axes:
      - name: "AK4Jet JetID"
        start: -0.5
        stop: 6.5
        bins: 7
  
  - module_name: SimpleHistogram
    hist_name: AK4HT  
    input_cols: [AK4HT]
    axes:
      - name: "AK4Jet $H_{T}$"
        start: 0
        stop: 3000
        bins: 60
        unit: "GeV"

  - module_name: SimpleHistogram
    hist_name: looseElectronN
    input_cols: [NlooseElectron]
    axes:
      - name: "$N_{\\text{loose},e}$"
        start: -0.5
        stop: 4.5
        bins: 5

  - module_name: SimpleHistogram
    hist_name: tightElectronN
    input_cols: [NtightElectron]
    axes:
      - name: "$N_{\\text{tight},e}$"
        start: -0.5
        stop: 4.5
        bins: 5

  - module_name: SimpleHistogram
    hist_name: looseMuonN
    input_cols: [NlooseMuon]
    axes:
      - name: "$N_{\\text{loose},\\mu}$"
        start: -0.5
        stop: 4.5
        bins: 5

  - module_name: SimpleHistogram
    hist_name: tightMuonN
    input_cols: [NtightMuon]
    axes:
      - name: "$N_{\\text{tight},\\mu}$"
        start: -0.5
        stop: 4.5
        bins: 5

{{ core.objects() }}
{{ core.regions() }}

analyzer:
  default_run_builder:
    strategy_name: MultiRunBuilder
    components:
      - strategy_name: NoSystematics
      - strategy_name: UnscaledOnly

  withHLT_NoSelection:
    - *withHLT_NoSelection
    - *common_histograms

  NoSelection:
    - *NoSelection
    - *common_histograms

  withHLT_ObjDef1:
    - *withHLT_ObjDef1
    - *common_histograms

  noHLT_ObjDef1:
    - *noHLT_ObjDef1
    - *common_histograms

  withHLT_ObjDef2:
    - *withHLT_ObjDef2
    - *common_histograms

  noHLT_ObjDef2:
    - *noHLT_ObjDef2
    - *common_histograms

  SignalOnly:
    - module_name: SelectAllTriggers
      sel_name: all_triggers

location_priorities: [".*(T0|T1|T2).*","eos"]

{%- macro signalmc_pipelines() %}
      - withHLT_NoSelection
      - NoSelection
      - withHLT_ObjDef1
      - noHLT_ObjDef1
      - withHLT_ObjDef2
      - noHLT_ObjDef2
      - SignalOnly
{%- endmacro %}

{%- macro mc_pipelines() %}
      - withHLT_NoSelection
      - NoSelection
      - withHLT_ObjDef1
      - noHLT_ObjDef1
      - withHLT_ObjDef2
      - noHLT_ObjDef2
{%- endmacro %}

event_collections:
  - dataset: 'ggHH2b2V6q_2024*'
    pipelines: 
    {{ signalmc_pipelines() }}
  - dataset: 'qcd*2024*'
    pipelines:
    {{ mc_pipelines() }}
  - dataset: 'tt_hadronic*2024*'
    pipelines:
    {{ mc_pipelines() }}
  - dataset: 'tt_semilep*2024'
    pipelines:
    {{ mc_pipelines() }}
        
