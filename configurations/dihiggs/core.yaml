    max_abs_eta: 2.5

  - module_name: HMuonMaker
    input_col: Muon
    output_col: tightMuon
    id_working_point: "tightId"
    min_pt: 15
    max_abs_eta: 2.4
    iso_working_pt: "tight"

  - module_name: HMuonMaker
    input_col: Muon
    output_col: looseMuon
    id_working_point: "looseId"
    min_pt: 5
    max_abs_eta: 2.4
    iso_working_pt: "loose"

  - module_name: HJetFilter
    input_col: Jet
    output_col: goodJet
    include_pu_id: False
    include_jet_id: True
    min_pt: 25
    max_abs_eta: 2.4

  - module_name: BQuarkMaker
    input_col: goodJet
    output_col: MedB
    working_point: M

  - module_name: HT
    input_col: Jet
    output_col: AK4HT

  - module_name: HT
    input_col: goodJet
    output_col: HT

  - module_name: HT
    input_col: GenJet
    output_col: GenJetHT

  - module_name: Count
    input_col: Jet
    output_col: NAK4Jet

  - module_name: Count
    input_col: goodJet
    output_col: NJet

  - module_name: Count
