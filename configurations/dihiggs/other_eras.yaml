common_histograms: &common_histograms
  - module_name: TopVecHistograms
    prefix: "Jet"
    input_col: goodJet
    max_idx: 6

  - module_name: FourVecHistograms
    input_col: goodJet
    hist_name: Jet
    mass_axis:
      name: "Jet $m$"
      start: 0
      stop: 500
      bins: 50

  - module_name: SimpleHistogram
    hist_name: JetHT
    input_cols: [HT]
    axes:
      - name: HT
        start: 0
        stop: 3000
        bins: 60
        unit: GeV
    
  - module_name: SimpleHistogram
    hist_name: JetN
    input_cols: [NJet]
    axes:
      - name: "$N_{jets}$"
        start: -0.5
        stop: 13.5
        bins: 14

  - module_name: FourVecHistograms
    input_col: MedB
    hist_name: MedB

  - module_name: SimpleHistogram
    hist_name: MedBN
    input_cols: [NMedB]
    axes:
      - name: "$N_{b}$"
        start: -0.5
        stop: 13.5
        bins: 14

  - module_name: JetComboHistograms
    input_col: MedB
    prefix: "b_dijet"
    jet_combos:
      - [0,1]
    mass_axis:
      name: "b_dijet"
      start: 0
      stop: 500
      bins: 50

  - module_name: FourVecHistograms
    input_col: Jet
    hist_name: AK4Jet
    mass_axis:
      name: "AK4Jet"
      start: 0
      stop: 500
      bins: 50
      unit: "GeV"

  - module_name: SimpleHistogram
    hist_name: AK4NJet
    input_cols: [NAK4Jet]
    axes: 
      - name: "$N_{AK4Jets}$"
        start: -0.5
        stop: 13.5
        bins: 14

  - module_name: SimpleHistogram
    hist_name: AK4JetID
    input_cols: [Jet.jetId]
    axes:
      - name: "AK4Jet JetID"
        start: -0.5
        stop: 6.5
        bins: 7
  
  - module_name: SimpleHistogram
    hist_name: AK4HT  
    input_cols: [AK4HT]
    axes:
      - name: "AK4Jet $H_{T}$"
        start: 0
        stop: 3000
        bins: 60
        unit: "GeV"

2024_plots: &2024_plots
  - module_name: SimpleHistogram
    hist_name: AK4JetQvG
    input_cols: [Jet.btagUParTAK4QvG]
    axes:
      - name: "AK4Jet UParTQvG Score"
        start: 0
        stop: 1
        bins: 20

  - module_name: SimpleHistogram
    hist_name: AK4Jetbtag
    input_cols: [Jet.btagUParTAK4B]
    axes:
      - name: "AK4Jet UParTB Score"
        start: 0
        stop: 1
        bins: 20

gen_vars: &gen_vars
  - module_name: GenPartFilter
    input_col: GenPart
    output_col: Gen_Higgs
    pdgId: 25
    status_flag: 13

  - module_name: GenPartDecayWalker
    input_col: GenPart
    output_col: GenPart_2b4q
    sample_type: signal

  - module_name: GenPartFilter
    input_col: GenPart_2b4q
    output_col: GenPart_2b
    pdgId: 5
    status_flag: [12, 7]

  - module_name: GenPartFilter
    input_col: GenPart_2b4q
    output_col: GenPart_4q
    pdgId: [1, 2, 3, 4]
    status_flag: [12, 7]

  # First copy quarks with hard process flag
  - module_name: GenPartFilter
    input_col: GenPart
    output_col: GenPart_hardprocess_quarks
    pdgId: [1, 2, 3, 4, 5]
    status_flag: [12, 7]   # isFirstCopy AND isHardProcess

  # First copy quarks without hard process flag
  - module_name: GenPartFilter
    input_col: GenPart
    output_col: GenPart_firstcopy_quarks
    pdgId: [1, 2, 3, 4, 5]
    status_flag: 12        # isFirstCopy only

  - module_name: GenPartFilter
    input_col: GenPart
    output_col: Gen_Ws
    pdgId: 24
    status_flag: 13
  
  - module_name: GenWOrganizer
    input_col: Gen_Ws
    onshell_col: Gen_W_onshell
    offshell_col: Gen_W_offshell

  - module_name: Count
    input_col: GenPart_hardprocess_quarks
    output_col: nhard_first_copy_qs

  - module_name: Count
    input_col: GenPart_firstcopy_quarks
    output_col: nfirst_copy_qs

  - module_name: GenDiparticleReconstructor
    input_col: GenPart_2b4q
    output_col: Gen_hbb
    daughter_pids: [5]

  - module_name: GenDiparticleReconstructor
    input_col: GenPart_2b4q
    output_col: Gen_hww
    daughter_pids: [1, 2, 3, 4]

  - module_name: GenPartMinDRMaker
    input_col: GenPart_2b4q
    output_col: min_dr_GenPart

  - module_name: GenPartMinDRMaker
    input_col: GenPart_2b
    output_col: min_dr_gen_hbb

  - module_name: GenPartMinDRMaker
    input_col: GenPart_4q
    output_col: min_dr_gen_hww

  - module_name: GenPartMinDRMaker
    input_col: Gen_Ws
    output_col: min_dr_Gen_Ws

  - module_name: GenBJetMatcher
    genpart_col: GenPart_2b
    genjet_col: GenJet
    output_col: GenBJet
    dr_threshold: 0.4

  - module_name: Count
    input_col: GenBJet
    output_col: n_GenBJet

  - module_name: GenWQuarkMatcher
    w_col: Gen_W_onshell
    quark_col: GenPart_4q
    output_col: dr_qq_onshell

  - module_name: GenWQuarkMatcher
    w_col: Gen_W_offshell
    quark_col: GenPart_4q
    output_col: dr_qq_offshell

  - module_name: GenQuarkPairDRTable
    b_col: GenPart_2b
    q_col: GenPart_4q
    w_onshell_col: Gen_W_onshell
    w_offshell_col: Gen_W_offshell
    output_col: min_dr_pair_idx

gen_histograms: &gen_histograms
  - module_name: TopVecHistograms
    prefix: "GenJet"
    input_col: GenJet
    max_idx: 6

  - module_name: SimpleHistogram
    hist_name: GenJetHT
    input_cols: [GenJetHT]
    axes:
      - name: "GenJet $H_{T}$"
        start: 0
        stop: 3000
        bins: 60
        unit: GeV

  - module_name: SimpleHistogram
    hist_name: GenNJet
    input_cols: [NGenJet]
    axes:
      - name: "$N_{GenJets}$"
        start: -0.5
        stop: 13.5
        bins: 14

  - module_name: FourVecHistograms
    input_col: GenJet
    hist_name: GenJet
    mass_axis:
      name: "GenJet"
      start: 0
      stop: 500
      bins: 50

  - module_name: SimpleHistogram
    hist_name: nhard_first_copy_qs
    input_cols: [nhard_first_copy_qs]
    axes:
      - name: "num 1st copy, hard process quarks"
        start: -0.5
        stop: 13.5
        bins: 14

  - module_name: SimpleHistogram
    hist_name: n_GenBJet
    input_cols: [n_GenBJet]
    axes:
      - name: "num gen b jets"
        start: -0.5
        stop: 13.5
        bins: 14

  - module_name: SimpleHistogram
    hist_name: nfirst_copy_qs
    input_cols: [nfirst_copy_qs]
    axes:
      - name: "num 1st copy quarks"
        start: -0.5
        stop: 13.5
        bins: 14

  - module_name: FourVecHistograms
    input_col: Gen_Higgs
    hist_name: Gen_Higgs
    mass_axis:
      name: "Gen_Higgs"
      start: 0
      stop: 500
      bins: 50
      unit: "GeV"

  - module_name: FourVecHistograms
    input_col: Gen_hbb
    hist_name: Gen_hbb
    mass_axis:
      name: "Gen_hbb"
      start: 0
      stop: 500
      bins: 50
      unit: "GeV"

  - module_name: FourVecHistograms
    input_col: Gen_hww
    hist_name: Gen_hww
    mass_axis:
      name: "Gen_hww"
      start: 0
      stop: 500
      bins: 50
      unit: "GeV"

  - module_name: FourVecHistograms
    input_col: Gen_Ws
    hist_name: Gen_Ws
    mass_axis:
      name: "Gen_W mass"
      start: 0
      stop: 500
      bins: 50
      unit: "GeV"

  - module_name: FourVecHistograms
    input_col: Gen_W_onshell
    hist_name: Gen_W_onshell
    mass_axis:
      name: "Gen_W_onshell mass"
      start: 0
      stop: 500
      bins: 50
      unit: "GeV"

  - module_name: FourVecHistograms
    input_col: Gen_W_offshell
    hist_name: Gen_W_offshell
    mass_axis:
      name: "Gen_W_offshell mass"
      start: 0
      stop: 500
      bins: 50
      unit: "GeV"

  - module_name: FourVecHistograms
    input_col: GenBJet
    hist_name: GenBJet
    mass_axis:
      name: 'Gen b Jet'
      start: 0
      stop: 500
      bins: 50
      unit: GeV

  - module_name: SimpleHistogram
    hist_name: min_dr_GenPart
    input_cols: [min_dr_GenPart]
    axes:
      - name: 'genpart min $\Delta R$ HH(2b4q)'
        start: 0.0
        stop: 3.0
        bins: 60

  - module_name: SimpleHistogram
    hist_name: min_dr_gen_hbb
    input_cols: [min_dr_gen_hbb]
    axes:
      - name: 'genpart min $\Delta R$ H(2b)'
        start: 0.0
        stop: 6.0
        bins: 60

  - module_name: SimpleHistogram
    hist_name: min_dr_gen_hww
    input_cols: [min_dr_gen_hww]
    axes:
      - name: 'genpart min $\Delta R$ H(4q)'
        start: 0.0
        stop: 3.0
        bins: 60

  - module_name: SimpleHistogram
    hist_name: min_dr_Gen_Ws
    input_cols: [min_dr_Gen_Ws]
    axes:
      - name: 'genpart $\Delta R$ H(2W)'
        start: 0.0
        stop: 3.0
        bins: 60

  - module_name: SimpleHistogram
    hist_name: dr_qq_onshell
    input_cols: [dr_qq_onshell]
    axes:
      - name: 'genpart $\Delta R$ onshell W(2q)'
        start: 0.0
        stop: 6.0
        bins: 60

  - module_name: SimpleHistogram
    hist_name: dr_qq_offshell
    input_cols: [dr_qq_offshell]
    axes:
      - name: 'genpart $\Delta R$ offshell W(2q)'
        start: 0.0
        stop: 6.0
        bins: 60

  - module_name: SimpleHistogram
    hist_name: min_dr_pair_idx
    input_cols: [min_dr_pair_idx]
    axes:
      - name: 'Genpart quark pairs that gave the min $\Delta R$'
        start: 0
        stop: 15
        bins: 15

cut_histograms: &cut_histograms
  - module_name: SimpleHistogram
    hist_name: HT
    input_cols: [HT]
    axes:
      - name: '$H_{T}$ after 400 GeV cut'
        start: 0
        stop: 3000
        bins: 60
        unit: GeV

analyzer:
  default_run_builder:
    strategy_name: NoSystematics
  withHLT_ObjDef1:
    - *hlt_selection
    - *common_objects
    - *tight_selection
    - module_name: SelectOnColumns
      sel_name: selection
    - *common_histograms
    - *2024_plots
    - *gen_histograms

  withHLT_ObjDef2:
    - *hlt_selection
    - *common_objects
    - *loose_selection
    - module_name: SelectOnColumns
      sel_name: selection
    - *common_histograms
    - *2024_plots
    - *gen_histograms

  noHLT_ObjDef1:
    - *common_objects
    - *tight_selection
    - module_name: SelectOnColumns
      sel_name: selection
    - *common_histograms
    - *2024_plots
    - *gen_histograms

  noHLT_ObjDef2:
    - *common_objects
    - *loose_selection
    - module_name: SelectOnColumns
      sel_name: selection
    - *common_histograms
    - *2024_plots
    - *gen_histograms

  withHLT_NoSelection:
    - *hlt_selection
    - *common_objects
    - *lepton_veto
    - *gen_vars
    - module_name: SelectOnColumns
      sel_name: selection
    - *common_histograms
    - *2024_plots
    - *gen_histograms

  withHLT_NoSelection_nolep:
    - *hlt_selection_2023
    - *common_objects
    - *lepton_veto
    - *gen_vars
    - module_name: SelectOnColumns
      sel_name: selection
    - *common_histograms
    - *gen_histograms

  withHLT_NoSelection_run2:
    - *common_objs_NO_JETID
    - *not-trigger_selection
    - *lepton_veto
    - *gen_vars
    - module_name: SelectOnColumns
      sel_name: selection
    - *cut_histograms
    - *common_histograms
    - *gen_histograms


  NoSelection:
    - *common_objects
    - *lepton_veto
    - *gen_vars
    - *common_histograms
    - *2024_plots
    - *gen_histograms

  NoSelection_2023:
    - *common_objects
    - *lepton_veto
    - *gen_vars
    - module_name: SelectOnColumns
      sel_name: selection
    - *common_histograms
    - *gen_histograms  

  NoSelection_run2_2018:
    - *common_objs_NO_JETID
    - *lepton_veto
    - *gen_vars
    - *common_histograms
    - *gen_histograms


location_priorities: [".*(T0|T1|T2).*","eos"]

event_collections:
  - dataset: 'ggHH2b2V6q_2024*'
    pipelines: 
      - withHLT_NoSelection
      - NoSelection
      #- withHLT_ObjDef1
      #- noHLT_ObjDef1
      #- withHLT_ObjDef2
      #- noHLT_ObjDef2
  
  - dataset: 'ggHHbbVV_2023_INCLUSIVE'
    pipelines:
      - withHLT_NoSelection_nolep
      - NoSelection_2023
  
  - dataset: 'ggHHbbVV_2018'
    pipelines:
      - withHLT_NoSelection_run2
      - NoSelection_run2_2018

