not-trigger_selection: &not-trigger_selection
  - module_name: NObjFilter
    input_col: looseElectron
    selection_name: zero_electron
    min_count: 0
    max_count: 0

  - module_name: NObjFilter
    input_col: looseMuon
    selection_name: zero_muon
    min_count: 0
    max_count: 0

  - module_name: NObjFilter
    input_col: goodJet
    selection_name: njets
    min_count: 6

  - module_name: NObjFilter
    input_col: MedB
    selection_name: 2b
    min_count: 2

  - module_name: ScalarCut
    input_col: HT
    selection_name: min_ht_cut
    min_val: 400

hlt_selection: &hlt_selection
  - module_name: SimpleHLT
    triggers: [250HT4J2B]

hlt_selection_2023: &hlt_selection_2023
  - module_name: SimpleHLT
    triggers: [280HT4J2B]

hlt_selection_2018: &hlt_selection_2018
  - module_name: SimpleHLT
    triggers: [HT400_6jet]

